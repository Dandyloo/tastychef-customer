<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FF1E8C">
  <title>Tasty Chef - Item</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components/bottom-nav.css">
  <link rel="stylesheet" href="css/components/header.css">
  <link rel="stylesheet" href="css/components/food-card.css">
  <link rel="stylesheet" href="css/pages/item.css">
</head>
<body data-page="item">

<!-- Back Button Header -->
<header class="item-header" id="item-header">
  <button class="item-header__back" onclick="history.back()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
  </button>
  <span class="item-header__title" id="item-header-title"></span>
</header>

<main class="item-page" id="main-content">

  <!-- Hero Image -->
  <div class="item-hero" id="item-hero">
    <img id="item-image" src="" alt="" loading="eager">
    <span class="item-hero__badge hidden" id="item-badge">Popular</span>
  </div>

  <!-- Item Details -->
  <div class="item-details">

    <div class="item-details__top">
      <div>
        <h1 class="item-details__name" id="item-name">Loading...</h1>
        <p class="item-details__category" id="item-category"></p>
      </div>
      <p class="item-details__price" id="item-price"></p>
    </div>

    <p class="item-details__description" id="item-description"></p>

    <div class="divider"></div>

    <!-- Quantity Selector -->
    <div class="qty-row">
      <span class="qty-row__label">Quantity</span>
      <div class="qty-selector">
        <button class="qty-btn" id="qty-minus" onclick="decreaseQty()">−</button>
        <span class="qty-value" id="qty-display">1</span>
        <button class="qty-btn" id="qty-plus" onclick="increaseQty()">+</button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Total -->
    <div class="item-total">
      <span class="item-total__label">Total</span>
      <span class="item-total__value" id="item-total">GH₵ 0.00</span>
    </div>

  </div>

</main>

<!-- Sticky Add to Cart Button -->
<div class="add-to-cart-bar">
  <button class="btn btn-primary" id="add-to-cart-btn" onclick="handleAddToCart()">
    Add to Cart 🛒
  </button>
</div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item" data-page="home">
      <div class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
          <path d="M9 21V12h6v9"/>
        </svg>
      </div>
      <span class="nav-label">Home</span>
    </a>
    <a href="menu.html" class="nav-item" data-page="menu">
      <div class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h18M3 12h18M3 18h18"/>
        </svg>
      </div>
      <span class="nav-label">Menu</span>
    </a>
    <a href="cart.html" class="nav-item" data-page="cart">
      <div class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span class="cart-badge hidden" id="cart-badge">0</span>
      </div>
      <span class="nav-label">Cart</span>
    </a>
    <a href="tracking.html" class="nav-item" data-page="tracking">
      <div class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
      </div>
      <span class="nav-label">Orders</span>
    </a>
  </nav>

<script src="js/utils.js"></script>
<script src="js/cart.js"></script>
<script src="js/api.js"></script>
<script src="js/pages/item.js"></script>
<script>
  highlightActiveTab();
  updateCartBadge();
</script>

</body>
</html>
