<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#FF1E8C">
  <title>Tasty Chef - Cart</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components/bottom-nav.css">
  <link rel="stylesheet" href="css/components/header.css">
  <link rel="stylesheet" href="css/components/cart-item.css">
  <link rel="stylesheet" href="css/pages/cart.css">
</head>
<body data-page="cart">

 <header class="app-header">
  <div class="app-header__brand">
    <span class="app-header__name">My Cart</span>
    <span class="app-header__tagline" id="cart-header-count">0 items</span>
  </div>
  <div class="app-header__actions">
    <button class="app-header__btn" id="clear-cart-btn"
            onclick="handleClearCart()" title="Clear cart">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6M14 11v6"/>
        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      </svg>
    </button>
  </div>
</header>

<main class="page-content" id="main-content">

  <!-- Cart Items List -->
  <div id="cart-items-container">
    <!-- Filled by JS -->
  </div>

  <!-- Order Summary -->
  <div class="order-summary hidden" id="order-summary">
    <h2 class="order-summary__title">Order Summary</h2>

    <div class="order-summary__row">
      <span>Subtotal</span>
      <span id="summary-subtotal">GH₵ 0.00</span>
    </div>

    <div class="order-summary__row">
      <span>Delivery Fee</span>
      <span id="summary-delivery">GH₵ 5.00</span>
    </div>

    <div class="divider"></div>

    <div class="order-summary__row order-summary__row--total">
      <span>Total</span>
      <span id="summary-total">GH₵ 0.00</span>
    </div>
  </div>

</main>

<!-- Sticky Checkout Button -->
<div class="checkout-bar hidden" id="checkout-bar">
  <button class="btn btn-primary" onclick="window.location.href='checkout.html'">
    Proceed to Checkout 🛒
  </button>
</div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item" data-page="home">
      <div class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
          <path d="M9 21V12h6v9"/>
        </svg>
      </div>
      <span class="nav-label">Home</span>
    </a>
    <a href="menu.html" class="nav-item" data-page="menu">
      <div class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h18M3 12h18M3 18h18"/>
        </svg>
      </div>
      <span class="nav-label">Menu</span>
    </a>
    <a href="cart.html" class="nav-item" data-page="cart">
      <div class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span class="cart-badge hidden" id="cart-badge">0</span>
      </div>
      <span class="nav-label">Cart</span>
    </a>
    <a href="tracking.html" class="nav-item" data-page="tracking">
      <div class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
      </div>
      <span class="nav-label">Orders</span>
    </a>
  </nav>

<script src="js/utils.js"></script>
<script src="js/cart.js"></script>
<script src="js/api.js"></script>
<script src="js/pages/cart.js"></script>
<script>
  highlightActiveTab();
  updateCartBadge();
</script>

</body>
</html>
