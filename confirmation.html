<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FF1E8C">
  <title>Tasty Chef - Confirmation</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components/bottom-nav.css">
  <link rel="stylesheet" href="css/components/header.css">
  <link rel="stylesheet" href="css/pages/confirmation.css">

</head>
<body data-page="confirmation">

<header class="app-header">
  <div class="app-header__brand">
    <span class="app-header__name">Order Placed!</span>
    <span class="app-header__tagline">For a Tasty Satisfaction</span>
  </div>
</header>

<main class="page-content" id="main-content">

  <!-- Success Animation -->
  <div class="confirm-hero">
    <div class="confirm-hero__circle">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1 class="confirm-hero__title">Order Confirmed! 🎉</h1>
    <p class="confirm-hero__sub">Fresh. Fast. Tasty. We're on it!</p>
  </div>

  <!-- Order ID Card -->
  <div class="card confirm-card">
    <p class="confirm-card__label">Your Order ID</p>
    <p class="confirm-card__id" id="confirm-order-id">TC-00000</p>
    <p class="confirm-card__hint">Save this to track your order</p>
  </div>

  <!-- Order Items -->
  <div class="card confirm-card" style="margin-top: var(--space-3);">
    <p class="confirm-card__label">Items Ordered</p>
    <div id="confirm-items">
      <!-- Filled by JS -->
    </div>
    <div class="divider"></div>
    <div class="confirm-totals">
      <div class="confirm-totals__row">
        <span>Subtotal</span>
        <span id="confirm-subtotal">GH₵ 0.00</span>
      </div>
      <div class="confirm-totals__row">
        <span>Delivery Fee</span>
        <span id="confirm-delivery">GH₵ 5.00</span>
      </div>
      <div class="confirm-totals__row confirm-totals__row--total">
        <span>Total Paid</span>
        <span id="confirm-total">GH₵ 0.00</span>
      </div>
    </div>
  </div>

  <!-- Delivery Details -->
  <div class="card confirm-card" style="margin-top: var(--space-3);">
    <p class="confirm-card__label">Delivering To</p>
    <p class="confirm-card__value" id="confirm-name"></p>
    <p class="confirm-card__value" id="confirm-phone"></p>
    <p class="confirm-card__value" id="confirm-address"></p>
  </div>

  <!-- Estimated Time -->
  <div class="confirm-eta">
    <span>🕐</span>
    <p>Estimated delivery: <strong>30–45 mins</strong></p>
  </div>

  <!-- Action Buttons -->
  <div style="display: flex; flex-direction: column; gap: var(--space-3); margin-top: var(--space-6);">
    <button class="btn btn-primary" onclick="window.location.href='tracking.html'">
      Track My Order 📦
    </button>
    <button class="btn btn-outline" onclick="window.location.href='index.html'">
      Back to Home
    </button>
  </div>

</main>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item" data-page="home">
      <div class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
          <path d="M9 21V12h6v9"/>
        </svg>
      </div>
      <span class="nav-label">Home</span>
    </a>
    <a href="menu.html" class="nav-item" data-page="menu">
      <div class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h18M3 12h18M3 18h18"/>
        </svg>
      </div>
      <span class="nav-label">Menu</span>
    </a>
    <a href="cart.html" class="nav-item" data-page="cart">
      <div class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span class="cart-badge hidden" id="cart-badge">0</span>
      </div>
      <span class="nav-label">Cart</span>
    </a>
    <a href="tracking.html" class="nav-item" data-page="tracking">
      <div class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
      </div>
      <span class="nav-label">Orders</span>
    </a>
  </nav>

<script src="js/utils.js"></script>
<script src="js/cart.js"></script>
<script src="js/api.js"></script>
<script src="js/pages/confirmation.js"></script>
<script>
  highlightActiveTab();
  updateCartBadge();
</script>

</body>
</html>
