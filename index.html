<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FF1E8C">
  <title>Tasty Chef</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components/bottom-nav.css">
  <link rel="stylesheet" href="css/components/header.css">
  <link rel="stylesheet" href="css/components/food-card.css">
  <link rel="stylesheet" href="css/pages/home.css">
</head>
<body data-page="home">

  <header class="app-header">
  <div class="app-header__brand">
    <span class="app-header__name">Tasty Chef</span>
    <span class="app-header__tagline">Fresh · Fast · Tasty</span>
  </div>
  <div class="app-header__actions">
    <button class="app-header__btn" onclick="window.location.href='menu.html'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
    </button>
  </div>
</header>

<main class="page-content" id="main-content">

  <!-- Hero Banner -->
  <div class="hero-banner">
    <div class="hero-banner__text">
      <p class="hero-banner__sub">No. 1 Fast Food in Cape Coast</p>
      <h1 class="hero-banner__title">Fresh. Fast.<br>Tasty. 🍽️</h1>
      <p class="hero-banner__tag">For a Tasty Satisfaction</p>
    </div>
  </div>

  <!-- Category Pills -->
  <div class="category-strip" id="category-strip">
    <!-- Filled by JS -->
  </div>

  <!-- Featured Section -->
  <div class="section-header">
    <span class="section-title">⭐ Popular</span>
    <a href="menu.html" class="section-link">See all</a>
  </div>
  <div class="food-grid" id="popular-grid">
    <!-- Filled by JS -->
  </div>

  <!-- All Items Section -->
  <div class="section-header" style="margin-top: var(--space-6);">
    <span class="section-title">Our Menu</span>
  </div>
  <div class="food-grid" id="all-grid">
    <!-- Filled by JS -->
  </div>

</main>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item" data-page="home">
      <div class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
          <path d="M9 21V12h6v9"/>
        </svg>
      </div>
      <span class="nav-label">Home</span>
    </a>
    <a href="menu.html" class="nav-item" data-page="menu">
      <div class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h18M3 12h18M3 18h18"/>
        </svg>
      </div>
      <span class="nav-label">Menu</span>
    </a>
    <a href="cart.html" class="nav-item" data-page="cart">
      <div class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span class="cart-badge hidden" id="cart-badge">0</span>
      </div>
      <span class="nav-label">Cart</span>
    </a>
    <a href="tracking.html" class="nav-item" data-page="tracking">
      <div class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
      </div>
      <span class="nav-label">Orders</span>
    </a>
  </nav>

<script src="js/utils.js"></script>
<script src="js/cart.js"></script>
<script src="js/api.js"></script>
<script src="js/pages/home.js"></script>
<script>
  highlightActiveTab();
  updateCartBadge();
</script>

</body>
</html>
